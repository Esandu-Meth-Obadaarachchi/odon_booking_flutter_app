name: odon_booking
description: A new Flutter project.

# The following line prevents the package from being accidentally published to
# pub.dev using `pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.34
# followed by an optional build number separated by a +.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  intl: ^0.18.1
  cupertino_icons: ^1.0.6
  table_calendar: ^3.0.0
  http: ^1.3.0
  month_picker_dialog: ^2.0.1
  google_fonts: 6.3.2  # Pinned: needs Dart >=3.7; 6.3.3+ needs 3.9 (breaks CI Flutter 3.32.4), 6.2.1 fails Dart 3.12 const-eval
  pdf: ^3.8.4
  path_provider: ^2.1.2  # For saving files
  open_file: ^3.0.3
  image_picker: ^1.0.4
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.1


flutter:
  uses-material-design: true


  # To add assets to your application, add an assets section, like this:

  assets:
    - assets/logo.JPG

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  min_sdk_android: 21
  image_path: "assets/logo.png"

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:

  fonts:
    - family: outfit
      fonts:
         - asset: fonts/Outfit-Bold.ttf
         - asset: fonts/Outfit-Medium.ttf


  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/custom-fonts/#from-packages
